# Override: Llama.cpp без GPU (Windows / CPU-only)
# Usage:
#   docker compose --env-file deploy/prod/.env \
#     -f deploy/prod/compose.yml \
#     -f deploy/prod/compose.tei-cpu.override.yml \
#     -f deploy/prod/compose.llama-cpu.override.yml up -d

services:
  llama-cpp:
    build:
      context: ../../local-dev/llama-cpp
    image: avgexpert-llama-cpp:cpu
    gpus: !reset null
    volumes:
      - ../../local-dev/data/llama:/models
    environment:
      LLAMA_N_GPU_LAYERS: "0"
      LLAMA_THREADS: "8"
      LLAMA_CTX_SIZE: "4096"
