name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: avgexpert
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: avgexpert/package-lock.json
        
    - name: Install dependencies
      run: npm ci

    - name: Typecheck
      run: npm run typecheck
      
    - name: Run ESLint
      run: npx eslint src/**/*.ts

    - name: Run PR Test Matrix
      run: npm run test:pr
      env:
        NODE_ENV: test

    - name: Run Security Tests
      run: npm run test:security
      env:
        NODE_ENV: test

    - name: Run Policy Tests
      run: npm run test:policy
      env:
        NODE_ENV: test

    - name: Run Knowledge Tests
      run: npm run test:knowledge
      env:
        NODE_ENV: test

    - name: Run Integration Tests
      run: npm run test:integration
      env:
        NODE_ENV: test
        APP_PG_ENABLED: 'false'
